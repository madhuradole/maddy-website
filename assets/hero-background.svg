      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.52" stop-color="#edf6f8"/>
      <stop offset="1" stop-color="#f8f4f7"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="22%" cy="28%" r="58%">
      <stop offset="0" stop-color="#5f8fe7" stop-opacity="0.24"/>
      <stop offset="0.52" stop-color="#5f8fe7" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#5f8fe7" stop-opacity="0"/>
